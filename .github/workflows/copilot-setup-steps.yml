# Reference: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update MoonBit dependencies
        run: |
            moon version --all
            # Increase MAX_ATTEMPTS when Copilot network is unstable.
            MAX_ATTEMPTS=5
            for i in $(seq 1 $MAX_ATTEMPTS); do
              echo "moon update attempt $i/$MAX_ATTEMPTS"
              if moon update; then
                exit 0
              fi
              if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
                echo "moon update failed, retrying in 10s..."
                sleep 10
              fi
            done
            echo "moon update failed after $MAX_ATTEMPTS attempts. Verify network egress allows access to download.mooncakes.io and cli.moonbitlang.com, or increase MAX_ATTEMPTS if the network is unstable."
            exit 1
            
