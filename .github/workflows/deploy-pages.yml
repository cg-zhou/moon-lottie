name: Deploy Site Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-bundle-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update MoonBit dependencies
        run: moon update

      - name: Install workspace dependencies
        run: npm install

      - name: Build unified deploy bundle
        run: npm run build:deploy

      - name: Deploy to demo branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Move build output to temporary location outside git project
          mkdir -p /tmp/site-dist
          cp -a deploy-dist/. /tmp/site-dist/

          # Fetch and checkout (or create) demo branch
          git fetch origin demo 2>/dev/null || true
          if git rev-parse --verify origin/demo 2>/dev/null; then
            git checkout -B demo origin/demo
          else
            git checkout --orphan demo
            git rm -rf .
          fi

          # Clean tracked and untracked files from the source branch build.
          git rm -rf . 2>/dev/null || true
          git clean -fdx
          
          # Copy from temporary location back to root
          cp -a /tmp/site-dist/. .

          git add .
          git diff --staged --quiet || git commit -m "Deploy site bundle [skip ci]"
          git push origin demo
