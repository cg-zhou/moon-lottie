name: Deploy Demo to demo Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: demo-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update MoonBit dependencies
        run: moon update

      - name: Build Wasm
        run: moon build --target wasm-gc --release

      - name: Prepare demo for deployment
        run: |
          mkdir -p /tmp/demo_dist
          cp demo/index.html /tmp/demo_dist/
          cp demo/main.js /tmp/demo_dist/
          cp _build/wasm-gc/release/build/cmd/main/main.wasm /tmp/demo_dist/
          mkdir -p /tmp/demo_dist/samples
          for src in samples/*.json; do
            base="$(basename "$src")"
            safe="${base// /_}"
            cp "$src" "/tmp/demo_dist/samples/$safe"
            jq -n --arg file "$safe" --arg label "${base%.json}" '{file:$file,label:$label}'
          done | jq -s . > /tmp/demo_dist/list.json

      - name: Deploy to demo branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin demo 2>/dev/null || true
          if git rev-parse --verify origin/demo 2>/dev/null; then
            git checkout -B demo origin/demo
          else
            git checkout --orphan demo
          fi

          git rm -rf . 2>/dev/null || true

          cp -r /tmp/demo_dist/* .

          git add .
          git diff --staged --quiet || git commit -m "Deploy demo [skip ci]"
          git push origin demo
