name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update MoonBit dependencies
        run: moon update

      - name: Run non-SVG tests
        id: tests
        run: |
          OUTPUT=$(moon test \
            -p cg-zhou/moon-lottie/lib/math \
            -p cg-zhou/moon-lottie/lib/parser \
            -p cg-zhou/moon-lottie/lib/renderer \
            -p cg-zhou/moon-lottie/lib/runtime \
            2>&1)
          echo "$OUTPUT"
          TOTAL=$(echo "$OUTPUT" | grep -E 'Total tests: [0-9]+' | grep -oE '[0-9]+' | head -1)
          PASSED=$(echo "$OUTPUT" | grep -E 'passed: [0-9]+' | grep -oE 'passed: [0-9]+' | grep -oE '[0-9]+')
          FAILED=$(echo "$OUTPUT" | grep -E 'failed: [0-9]+' | grep -oE 'failed: [0-9]+' | grep -oE '[0-9]+')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Count code lines
        id: lines
        run: |
          TOTAL_FILES=$(find lib -name "*.mbt" 2>/dev/null)
          SOURCE_FILES=$(find lib -name "*.mbt" ! -name "*_test.mbt" 2>/dev/null)
          if [ -n "$TOTAL_FILES" ]; then
            TOTAL=$(echo "$TOTAL_FILES" | xargs wc -l | tail -1 | awk '{print $1}')
          else
            TOTAL=0
          fi
          if [ -n "$SOURCE_FILES" ]; then
            SOURCE=$(echo "$SOURCE_FILES" | xargs wc -l | tail -1 | awk '{print $1}')
          else
            SOURCE=0
          fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT

      - name: Generate badge JSONs
        run: |
          mkdir -p badges

          TOTAL="${{ steps.tests.outputs.total }}"
          PASSED="${{ steps.tests.outputs.passed }}"
          FAILED="${{ steps.tests.outputs.failed }}"
          LINES_TOTAL="${{ steps.lines.outputs.total }}"
          LINES_SOURCE="${{ steps.lines.outputs.source }}"

          if [ -z "$FAILED" ] || [ "$FAILED" = "0" ]; then
            TEST_COLOR="brightgreen"
          else
            TEST_COLOR="red"
          fi

          if [ -n "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            COVERAGE=$(echo "$PASSED $TOTAL" | awk '{printf "%.0f%%", $1/$2*100}')
          else
            COVERAGE="N/A"
          fi

          printf '{"schemaVersion":1,"label":"tests","message":"%s total","color":"blue"}\n' "${TOTAL:-0}" > badges/tests-total.json
          printf '{"schemaVersion":1,"label":"passed","message":"%s / %s","color":"%s"}\n' "${PASSED:-0}" "${TOTAL:-0}" "${TEST_COLOR}" > badges/tests-passed.json
          printf '{"schemaVersion":1,"label":"coverage","message":"%s","color":"%s"}\n' "${COVERAGE}" "${TEST_COLOR}" > badges/coverage.json
          printf '{"schemaVersion":1,"label":"total lines","message":"%s","color":"blue"}\n' "${LINES_TOTAL:-0}" > badges/lines-total.json
          printf '{"schemaVersion":1,"label":"source lines","message":"%s","color":"blue"}\n' "${LINES_SOURCE:-0}" > badges/lines-source.json

      - name: Publish badges to badges branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save badge files
          cp -r badges /tmp/badges_output

          # Switch to badges branch (create if not exists)
          git fetch origin badges 2>/dev/null || true
          if git rev-parse --verify origin/badges 2>/dev/null; then
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p badges
          cp /tmp/badges_output/*.json badges/

          git add badges/
          git diff --staged --quiet || git commit -m "Update badges [skip ci]"
          git push origin badges
