<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Lottie Playground</title>
    <style>
        :root {
            --primary-color: #007aff;
            --primary-strong: #0059d6;
            --bg-color: #f3f5f8;
            --panel-color: rgba(255, 255, 255, 0.94);
            --panel-strong: rgba(255, 255, 255, 0.98);
            --border-color: #e5e7eb;
            --text-color: #111827;
            --secondary-text: #6b7280;
            --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
            --toolbar-height: 60px;
            --controls-height: 60px;
            --drawer-width: min(360px, calc(100vw - 32px));
        }

        body,
        button,
        input,
        select,
        textarea {
            font-size: 13px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(0, 122, 255, 0.08), transparent 28%),
                linear-gradient(180deg, #ffffff 0%, #f5f6f9 56%, #eef2f7 100%);
            color: var(--text-color);
        }

        body.drawer-open {
            overflow: hidden;
        }

        .app-shell {
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            isolation: isolate;
        }

        .top-toolbar {
            height: var(--toolbar-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(229, 231, 235, 0.88);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(20px);
            z-index: 30;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .toolbar-group--grow {
            flex: 1;
            min-width: 0;
        }

        .icon-btn,
        .action-btn,
        .toggle-btn,
        .speed-btn,
        .speed-input {
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.92);
            color: var(--text-color);
            border-radius: 6px;
            min-height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .icon-btn:hover,
        .action-btn:hover,
        .toggle-btn:hover,
        .speed-btn:hover,
        .speed-input:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #cdd4df;
            transform: translateY(-1px);
        }

        .icon-btn {
            width: 42px;
            font-size: 13px;
            font-weight: 700;
        }

        .action-btn,
        .toggle-btn,
        .speed-btn,
        .speed-input {
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
        }

        .speed-btn {
            padding: 0 8px;
            min-width: 36px;
        }

        .speed-input {
            width: 42px;
            border: 0;
            background: transparent;
            min-height: 28px;
            padding: 0 2px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-color);
            transition: all 0.2s;
            cursor: pointer;
        }

        .speed-input:hover {
            background: rgba(0, 0, 0, 0.04);
            border-radius: 4px;
        }

        .speed-input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.06);
            color: var(--primary-strong);
            border-radius: 4px;
            cursor: text;
        }

        .toggle-btn.is-active,
        .speed-btn.is-active,
        .runtime-btn.is-active,
        .bg-btn.is-active {
            color: var(--primary-strong);
            border-color: rgba(0, 122, 255, 0.28);
        }

        .current-file {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 2px;
        }

        .current-file__label {
            margin: 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--secondary-text);
        }

        .current-file__name {
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toolbar-segment {
            display: inline-flex;
            align-items: center;
            padding: 3px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid var(--border-color);
            gap: 2px;
        }

        .bg-btn,
        .runtime-btn {
            min-height: 28px;
            min-width: 28px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            color: var(--secondary-text);
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .bg-btn--grid {
            background:
                conic-gradient(#ffffff 90deg, #d1d5db 90deg 180deg, #ffffff 180deg 270deg, #d1d5db 270deg);
            background-size: 6px 6px;
        }

        .bg-btn--white {
            background: #ffffff;
            border: 1px solid #e5e7eb;
        }

        .bg-btn--black {
            background: #111827;
        }

        .bg-btn.is-active,
        .runtime-btn.is-active {
            background-color: #fff;
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 2px 4px rgba(0, 122, 255, 0.1);
        }

        .bg-btn--black.is-active {
            background-color: #111827;
        }

        .runtime-btn {
            min-width: 42px;
            padding: 0 6px;
        }

        .playlist-backdrop,
        .panel-backdrop,
        .drop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.34);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
            z-index: 40;
        }

        .playlist-backdrop.is-open,
        .panel-backdrop.is-open,
        .drop-overlay.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .playlist-drawer,
        .details-panel {
            position: fixed;
            top: 0;
            bottom: 0;
            width: var(--drawer-width);
            background: var(--panel-strong);
            box-shadow: var(--shadow);
            z-index: 40;
            display: flex;
            flex-direction: column;
            transition: transform 0.22s ease;
        }

        .playlist-drawer {
            left: 0;
            transform: translateX(-100%);
            border-right: 1px solid rgba(229, 231, 235, 0.88);
        }

        .playlist-drawer.is-open {
            transform: translateX(0);
        }

        .details-panel {
            right: 0;
            transform: translateX(100%);
            border-left: 1px solid rgba(229, 231, 235, 0.88);
        }

        .details-panel.is-open {
            transform: translateX(0);
        }

        .drawer-header,
        .panel-header {
            display: flex;
            align-items: center; /* 垂直居中 */
            justify-content: space-between;
            gap: 12px;
            padding: 14px 20px; /* 稍微缩小高度，更精致 */
            min-height: 64px;
            border-bottom: 1px solid var(--border-color);
        }

        .drawer-header {
            flex-direction: row; /* 列表：标题左，按钮右 */
        }

        .panel-header {
            flex-direction: row-reverse; /* 详情：按钮左，标题右 */
        }

        .drawer-title,
        .panel-title {
            margin: 0;
            font-size: 13px;
            font-weight: 700;
        }

        .search-wrap,
        .drawer-footer,
        .panel-body {
            padding: 16px 20px;
        }

        .search-input {
            width: 100%;
            min-height: 36px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            padding: 0 14px;
            font-size: 13px;
            outline: none;
            background: #fff;
        }

        .search-input:focus {
            border-color: rgba(0, 122, 255, 0.36);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.08);
        }

        .playlist-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .playlist-item {
            width: 100%;
            text-align: left;
            border: 0;
            background: transparent;
            border-radius: 4px;
            padding: 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            color: inherit;
        }

        .playlist-item:hover {
            background: rgba(0, 122, 255, 0.06);
        }

        .playlist-item.is-active {
            background: rgba(0, 122, 255, 0.1);
        }

        .playlist-item__title {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.4;
        }

        .playlist-item__meta {
            font-size: 12px;
            color: var(--secondary-text);
        }

        .playlist-empty {
            padding: 20px 12px;
            color: var(--secondary-text);
            font-size: 13px;
            line-height: 1.6;
        }

        .drawer-footer {
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--secondary-text);
            line-height: 1.6;
        }

        .player-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .viewport-container {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center; 
            justify-content: center;
            gap: 16px;
            padding: 20px;
            background-color: #eef1f6;
            overflow: hidden; 
            background-image:
                linear-gradient(45deg, #dce1e9 25%, transparent 25%),
                linear-gradient(-45deg, #dce1e9 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #dce1e9 75%),
                linear-gradient(-45deg, transparent 75%, #dce1e9 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .viewport-container.bg-white { background: #ffffff; }
        .viewport-container.bg-black { background: #05070b; }

        .canvas-wrapper {
            flex: 0 1 auto;
            min-width: 0;
            min-height: 0;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .canvas-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
        }

        .canvas-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.85);
            color: #ffffff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .canvas-meta {
            font-size: 11px;
            color: var(--secondary-text);
            font-weight: 600;
            white-space: nowrap;
        }

        .canvas-stage {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        #lottie-canvas,
        #official-lottie-container {
            max-width: 100%;
            max-height: 100%;
            display: block;
            object-fit: contain;
        }

        #official-lottie-container svg {
            display: block;
            margin: auto;
            max-width: 100% !important;
            max-height: 100% !important;
        }

        .control-bar {
            min-height: var(--controls-height);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-top: 1px solid rgba(229, 231, 235, 0.88);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
            z-index: 20;
        }

        .control-bar__cluster {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .primary-play-btn,
        .frame-btn,
        .track-btn {
            border: 0;
            cursor: pointer;
            border-radius: 4px;
            min-height: 36px;
            min-width: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: transform 0.18s ease, background 0.18s ease;
        }

        .primary-play-btn {
            background: linear-gradient(135deg, var(--primary-color), #30c7ff);
            color: white;
            box-shadow: 0 10px 22px rgba(0, 122, 255, 0.24);
        }

        .frame-btn,
        .track-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .track-btn {
            min-width: 44px;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        #seek-bar {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #d5dbe5;
            border-radius: 999px;
            cursor: pointer;
            outline: none;
        }

        #seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
        }

        #frame-info {
            min-width: 110px;
            font-size: 13px;
            color: var(--secondary-text);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .speed-control {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            color: var(--secondary-text);
        }

        .speed-input {
            width: 72px;
            min-height: 36px;
            padding: 0 10px;
            justify-content: flex-start;
            cursor: text;
            transform: none;
        }

        .speed-input:focus {
            outline: none;
            border-color: rgba(0, 122, 255, 0.36);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.08);
        }

        .details-grid {
            display: grid;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            font-size: 13px;
        }

        .info-label {
            color: var(--secondary-text);
        }

        .info-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        #status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #c7cdd8;
            margin-left: 6px;
        }

        .drop-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-overlay__card {
            width: min(520px, calc(100vw - 32px));
            padding: 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(229, 231, 235, 0.92);
            text-align: center;
            box-shadow: var(--shadow);
        }

        .drop-overlay__card h2 {
            margin: 0 0 8px;
            font-size: 13px;
        }

        .drop-overlay__card p {
            margin: 0;
            color: var(--secondary-text);
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            :root {
                --toolbar-height: 62px;
                --controls-height: 112px;
            }

            .top-toolbar {
                height: auto;
                flex-wrap: wrap;
                align-items: stretch;
                padding: 10px 12px;
                gap: 8px;
            }

            .toolbar-group {
                gap: 8px;
            }

            .toolbar-group--right {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }

            .toolbar-group--grow {
                width: 100%;
                min-width: 0;
            }

            .toolbar-segment {
                max-width: 100%;
            }

            .icon-btn,
            .action-btn,
            .toggle-btn,
            .speed-btn,
            .speed-input {
                min-height: 36px;
                border-radius: 8px;
            }

            .current-file__name {
                font-size: 13px;
            }

            .current-file {
                flex: 1;
            }

            .canvas-wrapper {
                flex: 1 1 0;
            }

            .canvas-head {
                gap: 8px;
            }

            .canvas-tag {
                padding: 4px 8px;
            }

            .control-bar {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 12px;
            }

            .control-bar__cluster {
                justify-content: center;
                flex-wrap: wrap;
            }

            .progress-wrap {
                order: -1;
            }

            #frame-info {
                min-width: 86px;
            }

            .details-panel {
                width: min(100vw, 420px);
            }

            .speed-control {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
    <script src="./lottie.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="top-toolbar">
            <div class="toolbar-group toolbar-group--grow">
                <button id="playlist-toggle" class="icon-btn" type="button" aria-label="打开播放列表">☰</button>
                <button id="open-file-btn" class="action-btn" type="button">打开</button>
                <input type="file" id="file-input" accept=".json" hidden>
                <div class="current-file">
                    <p class="current-file__label">当前文件 <span id="status-dot"></span></p>
                    <p class="current-file__name" id="current-file-name">选择一个样例或打开本地 JSON</p>
                </div>
            </div>
            <div class="toolbar-group toolbar-group--right">
                <div class="toolbar-segment" aria-label="背景切换">
                    <button class="bg-btn bg-btn--grid is-active" type="button" data-bg="grid" title="网格背景"></button>
                    <button class="bg-btn bg-btn--white" type="button" data-bg="white" title="白色背景"></button>
                    <button class="bg-btn bg-btn--black" type="button" data-bg="black" title="黑色背景"></button>
                </div>
                <button id="compare-toggle" class="toggle-btn is-active" type="button" aria-pressed="true">对比</button>
                <div class="toolbar-segment" aria-label="运行时选择">
                    <button class="runtime-btn is-active" type="button" data-runtime="auto">Auto</button>
                    <button class="runtime-btn" type="button" data-runtime="wasm">Wasm</button>
                    <button class="runtime-btn" type="button" data-runtime="js">JS</button>
                </div>
                <button id="details-toggle" class="toggle-btn" type="button">详情</button>
            </div>
        </header>

        <div id="playlist-backdrop" class="playlist-backdrop"></div>
        <aside id="playlist-drawer" class="playlist-drawer" aria-hidden="true">
            <div class="drawer-header">
                <div>
                    <h1 class="drawer-title">播放列表</h1>
                </div>
                <button id="playlist-close" class="icon-btn" type="button" aria-label="收起播放列表">⟨</button>
            </div>
            <div class="search-wrap">
                <input id="playlist-search" class="search-input" type="search" placeholder="检索样例名称">
            </div>
            <div id="playlist-list" class="playlist-list">
                <div class="playlist-empty">正在加载样例列表...</div>
            </div>
            <div class="drawer-footer">
                也可以直接点击顶部“打开”，或将本地 JSON 文件拖到页面任意区域。
            </div>
        </aside>

        <div id="panel-backdrop" class="panel-backdrop"></div>
        <aside id="details-panel" class="details-panel" aria-hidden="true">
            <div class="panel-header">
                <div>
                    <h2 class="panel-title">动画详情</h2>
                </div>
                <button id="details-close" class="icon-btn" type="button" aria-label="收起详情">⟩</button>
            </div>
            <div class="panel-body">
                <div class="details-grid">
                    <div class="info-row"><span class="info-label">名称</span><span class="info-value" id="info-filename">-</span></div>
                    <div class="info-row"><span class="info-label">大小</span><span class="info-value" id="info-filesize">-</span></div>
                    <div class="info-row"><span class="info-label">资源版本</span><span class="info-value" id="info-version">-</span></div>
                    <div class="info-row"><span class="info-label">持续时间</span><span class="info-value" id="info-duration">-</span></div>
                    <div class="info-row"><span class="info-label">帧率</span><span class="info-value" id="info-fps">-</span></div>
                    <div class="info-row"><span class="info-label">总帧数</span><span class="info-value" id="info-total-frames">-</span></div>
                    <div class="info-row"><span class="info-label">设计尺寸</span><span class="info-value" id="info-size">-</span></div>
                    <div class="info-row"><span class="info-label">运行时</span><span class="info-value" id="info-runtime">Auto</span></div>
                    <div class="info-row"><span class="info-label">发布时间</span><span class="info-value" id="deploy-time" data-utc=""></span></div>
                </div>
            </div>
        </aside>

        <main class="player-shell">
            <div class="viewport-container" id="viewport">
                <section class="canvas-wrapper" id="wasm-wrapper">
                    <div class="canvas-head">
                        <div class="canvas-tag">Moon Lottie</div>
                    </div>
                    <div class="canvas-stage">
                        <canvas id="lottie-canvas"></canvas>
                    </div>
                </section>
                <section class="canvas-wrapper" id="official-wrapper">
                    <div class="canvas-head">
                        <div class="canvas-tag">Lottie Web</div>
                    </div>
                    <div class="canvas-stage">
                        <div id="official-lottie-container"></div>
                    </div>
                </section>
            </div>

            <footer class="control-bar">
                <div class="control-bar__cluster">
                    <button id="prev-animation" class="track-btn" type="button" aria-label="上一个动画">⏮</button>
                    <button id="prev-frame" class="frame-btn" type="button" aria-label="上一帧">⟨</button>
                    <button id="play-pause" class="primary-play-btn" type="button" aria-label="播放或暂停">▶</button>
                    <button id="next-frame" class="frame-btn" type="button" aria-label="下一帧">⟩</button>
                    <button id="next-animation" class="track-btn" type="button" aria-label="下一个动画">⏭</button>
                </div>
                <div class="progress-wrap">
                    <input type="range" id="seek-bar" min="0" max="100" value="0">
                    <span id="frame-info">0 / 0</span>
                </div>
                <div class="control-bar__cluster">
                    <div class="toolbar-segment" aria-label="播放速度">
                        <button class="speed-btn" type="button" data-speed="0.5">0.5</button>
                        <button class="speed-btn is-active" type="button" data-speed="1">1.0</button>
                        <button class="speed-btn" type="button" data-speed="2">2.0</button>
                        <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1); margin: 0 4px;"></div>
                        <input id="speed-input" class="speed-input" type="number" min="0.1" max="4" step="0.1" value="1.0" title="自定义速度">
                    </div>
                </div>
            </footer>
        </main>

        <div id="drop-overlay" class="drop-overlay" aria-hidden="true">
            <div class="drop-overlay__card">
                <h2>打开本地 JSON</h2>
                <p>把文件拖到这里即可直接预览，不会上传到服务器。</p>
            </div>
        </div>
    </div>

    <script type="module" src="./playground-app.js"></script>
</body>
</html>
