<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonLottie - WebAssembly Lottie Player</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        canvas {
            border: 1px solid #eee;
            background-color: #fff;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background-color: #007aff;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background-color: #0063cc; }
        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        #file-input { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MoonLottie Demo</h1>
        <p>Powered by MoonBit & WebAssembly GC</p>
        
        <input type="file" id="file-input" accept=".json">
        <br>
        <canvas id="lottie-canvas" width="500" height="500"></canvas>
        
        <div class="controls">
            <button id="play-pause">Pause</button>
            <input type="range" id="seek-bar" min="0" max="100" value="0" style="width: 200px;">
            <span id="frame-info">Frame: 0</span>
        </div>
        <div class="controls" style="margin-top: 10px;">
            <label for="speed">Speed: </label>
            <input type="range" id="speed" min="0" max="2" step="0.1" value="1.0">
        </div>

        <div class="info">
            Status: <span id="status">Loading WebAssembly...</span>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
