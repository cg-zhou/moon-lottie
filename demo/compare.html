<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frame 10 Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
body { margin: 20px; font-family: monospace; background: #333; color: #fff; }
.row { display: flex; gap: 20px; margin-bottom: 20px; }
canvas, .lottie-container { background: white; }
#diff-canvas { background: black; }
#status { padding: 10px; background: #444; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="status">Loading...</div>
<div class="row">
  <div>
    <h3>MoonLottie (WASM) - Frame 10</h3>
    <canvas id="moon-canvas" width="1000" height="1000" style="width:400px;height:400px;"></canvas>
  </div>
  <div>
    <h3>lottie-web (Official) - Frame 10</h3>
    <canvas id="official-canvas" width="1000" height="1000" style="width:400px;height:400px;"></canvas>
  </div>
  <div>
    <h3>Diff (amplified 10x)</h3>
    <canvas id="diff-canvas" width="1000" height="1000" style="width:400px;height:400px;"></canvas>
  </div>
</div>
<div id="diff-stats"></div>

<script type="module">
const statusEl = document.getElementById('status');
const moonCanvas = document.getElementById('moon-canvas');
const officialCanvas = document.getElementById('official-canvas');
const diffCanvas = document.getElementById('diff-canvas');
let moonCtx = moonCanvas.getContext('2d');

let currentJsonStr = "";
let currentGradient = null;
const fillRuleStack = [];
const offscreenStack = [];
let ctx = moonCtx;

function moonStringJS(moonStr) {
    if (typeof moonStr === 'string') return moonStr;
    if (!moonStr) return "";
    const len = typeof moonStr.length === 'function' ? moonStr.length() : moonStr.length;
    if (typeof len !== 'number') return "";
    let res = "";
    for (let i = 0; i < len; i++) {
        const code = typeof moonStr.get === 'function' ? moonStr.get(i) : moonStr[i];
        if (typeof code !== 'number') return "";
        res += String.fromCharCode(code);
    }
    return res;
}

const importObject = {
  demo: {
    get_json_len: () => currentJsonStr.length,
    get_json_char: (idx) => currentJsonStr.charCodeAt(idx),
    log_frame: (f) => {}
  },
  spectest: { print_char: (c) => {} },
  canvas: {
    save: () => { ctx.save(); fillRuleStack.push(ctx._currentFillRule || "nonzero"); },
    restore: () => { ctx.restore(); ctx._currentFillRule = fillRuleStack.pop() || "nonzero"; },
    beginPath: () => ctx.beginPath(),
    closePath: () => ctx.closePath(),
    moveTo: (x, y) => ctx.moveTo(x, y),
    lineTo: (x, y) => ctx.lineTo(x, y),
    bezierCurveTo: (cp1x, cp1y, cp2x, cp2y, x, y) => ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x, y),
    fill: (r, g, b, a) => { 
        ctx.save(); ctx.globalAlpha *= a; ctx.fillStyle = `rgb(${r},${g},${b})`; 
        ctx.fill(ctx._currentFillRule || "nonzero"); ctx.restore();
    },
    stroke: (r, g, b, a, width) => { 
        ctx.save(); ctx.globalAlpha *= a; ctx.strokeStyle = `rgb(${r},${g},${b})`; 
        ctx.lineWidth = width; ctx.stroke(); ctx.restore();
    },
    setStrokeStyle: (cap, join, miter) => {
        const caps = ["butt", "round", "square"]; const joins = ["miter", "round", "bevel"];
        ctx.lineCap = caps[cap - 1] || "butt"; ctx.lineJoin = joins[join - 1] || "miter"; ctx.miterLimit = miter;
    },
    setFillRule: (rule) => { ctx._currentFillRule = moonStringJS(rule); },
    createLinearGradient: (x1, y1, x2, y2) => { currentGradient = ctx.createLinearGradient(x1, y1, x2, y2); },
    createRadialGradient: (cx, cy, r, fx, fy, fr) => { currentGradient = ctx.createRadialGradient(fx, fy, fr, cx, cy, r); },
    addGradientStop: (offset, r, g, b, a) => { if (currentGradient) currentGradient.addColorStop(offset, `rgba(${r},${g},${b},${a})`); },
    fillGradient: (a) => { if (currentGradient) { ctx.save(); ctx.globalAlpha *= a; ctx.fillStyle = currentGradient; ctx.fill(ctx._currentFillRule || "nonzero"); ctx.restore(); } },
    strokeGradient: (a, w) => { if (currentGradient) { ctx.save(); ctx.globalAlpha *= a; ctx.strokeStyle = currentGradient; ctx.lineWidth = w; ctx.stroke(); ctx.restore(); } },
    clip: () => ctx.clip(ctx._currentFillRule || "nonzero"),
    clearRect: (x, y, w, h) => ctx.clearRect(x, y, w, h),
    setGlobalAlpha: (a) => { ctx.globalAlpha = a; },
    setOpacity: (a) => { ctx.globalAlpha *= a; },
    setTransform: (a, b, c, d, e, f) => ctx.setTransform(a, b, c, d, e, f),
    transform: (a, b, c, d, e, f) => ctx.transform(a, b, c, d, e, f),
    drawImage: (id, w, h) => {},
    drawText: (text, font, size, r, g, b, a, justify) => {
        ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.font = `${size}px ${moonStringJS(font) || 'Arial'}`;
        const aligns = ["left", "right", "center"]; ctx.textAlign = aligns[justify] || "left";
        ctx.fillText(moonStringJS(text), 0, 0); ctx.restore();
    },
    setGlobalCompositeOperation: (mode) => { ctx.globalCompositeOperation = moonStringJS(mode); },
    beginLayer: () => {
        const offscreen = document.createElement('canvas');
        offscreen.width = moonCanvas.width;
        offscreen.height = moonCanvas.height;
        const offCtx = offscreen.getContext('2d');
        const t = ctx.getTransform();
        offCtx.setTransform(t.a, t.b, t.c, t.d, t.e, t.f);
        offscreenStack.push({ savedCtx: ctx, offscreen, savedOpacity: ctx.globalAlpha });
        ctx = offCtx;
        ctx.globalAlpha = 1.0;
    },
    endLayer: (mode) => {
        if (offscreenStack.length === 0) return;
        const { savedCtx, offscreen, savedOpacity } = offscreenStack.pop();
        savedCtx.save();
        savedCtx.setTransform(1, 0, 0, 1, 0, 0);
        savedCtx.globalCompositeOperation = moonStringJS(mode);
        savedCtx.globalAlpha = savedOpacity;
        savedCtx.drawImage(offscreen, 0, 0);
        savedCtx.restore();
        ctx = savedCtx;
    }
  },
  expressions: {
    evaluate_double: (code_ptr, time, val) => {
        try { return new Function('value', 'time', `"use strict"; return (${moonStringJS(code_ptr)});`)(val, time); } catch (e) { return val; }
    },
    evaluate_vec_into: (code_ptr, time, arr) => {
        try {
            const res = new Function('value', 'time', `"use strict"; return (${moonStringJS(code_ptr)});`)([...arr], time);
            if (Array.isArray(res)) res.forEach((v, i) => i < arr.length && arr.set(i, v));
        } catch (e) {}
    }
  }
};

async function run() {
    statusEl.textContent = "Loading WASM...";
    
    const response = await fetch('../_build/wasm-gc/debug/build/cmd/main/main.wasm', { cache: 'no-store' });
    const buffer = await response.arrayBuffer();
    const { instance } = await WebAssembly.instantiate(buffer, importObject);
    const moonLottie = instance.exports;
    
    statusEl.textContent = "Loading animation JSON...";
    const jsonResp = await fetch('../samples/1_4_Cat_Fishing_On_Moon.json');
    const jsonText = await jsonResp.text();
    const animationData = JSON.parse(jsonText);
    currentJsonStr = jsonText;
    
    // Render MoonLottie at frame 10
    statusEl.textContent = "Rendering MoonLottie frame 10...";
    const player = moonLottie.create_player_from_js();
    moonLottie.update_player_with_speed(player, 10, 0);
    
    // Render official lottie-web at frame 10 using canvas renderer directly
    statusEl.textContent = "Rendering lottie-web frame 10...";
    const officialCtx = officialCanvas.getContext('2d');
    
    await new Promise((resolve) => {
        const anim = lottie.loadAnimation({
            container: document.createElement('div'),
            renderer: 'canvas',
            loop: false,
            autoplay: false,
            animationData: animationData,
            rendererSettings: {
                context: officialCtx,
                preserveAspectRatio: 'xMidYMid meet',
                clearCanvas: true
            }
        });
        
        anim.addEventListener('DOMLoaded', () => {
            anim.goToAndStop(10, true);
            setTimeout(() => {
                resolve();
            }, 500);
        });
    });
    
    // Compute pixel diff
    statusEl.textContent = "Computing diff...";
    const moonData = moonCtx.getImageData(0, 0, 1000, 1000);
    const officialData = officialCtx.getImageData(0, 0, 1000, 1000);
    const diffCtx = diffCanvas.getContext('2d');
    const diffImageData = diffCtx.createImageData(1000, 1000);
    
    let totalDiff = 0;
    let maxDiff = 0;
    let diffPixelCount = 0;
    let significantDiffCount = 0;
    
    // Region analysis
    const regionSize = 100;
    const regionDiffs = {};
    
    for (let i = 0; i < moonData.data.length; i += 4) {
        const pixelIdx = i / 4;
        const x = pixelIdx % 1000;
        const y = Math.floor(pixelIdx / 1000);
        
        const dr = Math.abs(moonData.data[i] - officialData.data[i]);
        const dg = Math.abs(moonData.data[i+1] - officialData.data[i+1]);
        const db = Math.abs(moonData.data[i+2] - officialData.data[i+2]);
        const da = Math.abs(moonData.data[i+3] - officialData.data[i+3]);
        const pixelDiff = dr + dg + db + da;
        
        if (pixelDiff > 0) {
            diffPixelCount++;
            totalDiff += pixelDiff;
            maxDiff = Math.max(maxDiff, pixelDiff);
            
            if (pixelDiff > 10) {
                significantDiffCount++;
                const rx = Math.floor(x / regionSize);
                const ry = Math.floor(y / regionSize);
                const key = `${rx},${ry}`;
                regionDiffs[key] = (regionDiffs[key] || 0) + 1;
            }
        }
        
        const amp = 10;
        diffImageData.data[i] = Math.min(255, dr * amp);
        diffImageData.data[i+1] = Math.min(255, dg * amp);
        diffImageData.data[i+2] = Math.min(255, db * amp);
        diffImageData.data[i+3] = 255;
    }
    
    diffCtx.putImageData(diffImageData, 0, 0);
    
    // Sort regions by diff count
    const sortedRegions = Object.entries(regionDiffs)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10)
        .map(([key, count]) => {
            const [rx, ry] = key.split(',').map(Number);
            return `Region (${rx*regionSize}-${(rx+1)*regionSize}, ${ry*regionSize}-${(ry+1)*regionSize}): ${count} pixels`;
        })
        .join('<br>');
    
    const totalPixels = 1000 * 1000;
    document.getElementById('diff-stats').innerHTML = `
        <h3>Diff Statistics:</h3>
        <p>Total pixels: ${totalPixels}</p>
        <p>Different pixels: ${diffPixelCount} (${(diffPixelCount/totalPixels*100).toFixed(2)}%)</p>
        <p>Significant diff (>10): ${significantDiffCount} (${(significantDiffCount/totalPixels*100).toFixed(2)}%)</p>
        <p>Max single-pixel diff: ${maxDiff}</p>
        <p>Avg diff per different pixel: ${diffPixelCount > 0 ? (totalDiff/diffPixelCount).toFixed(2) : 0}</p>
        <h3>Top Different Regions:</h3>
        <p>${sortedRegions || 'None'}</p>
    `;
    
    statusEl.textContent = "Done! Comparison complete.";
    window._comparisonDone = true;
    window._diffStats = {
        totalPixels,
        diffPixelCount,
        significantDiffCount,
        maxDiff,
        avgDiff: diffPixelCount > 0 ? totalDiff/diffPixelCount : 0
    };
}

run().catch(e => {
    statusEl.textContent = "Error: " + e.message;
    console.error(e);
});
</script>
</body>
</html>
