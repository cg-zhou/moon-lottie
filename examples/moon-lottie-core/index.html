<!DOCTYPE html>
<html>
<head>
    <title>Web Component Example</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #lottie-container {
            width: 300px;
            height: 200px;
            border: 1px solid #ccc;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            align-items: center;
        }

        #status {
            margin-top: 12px;
            color: #555;
        }
    </style>
  <script type="module" crossorigin src="./assets/index-D3BwLxvO.js"></script>
</head>
<body>
    <h2>Web Component Example</h2>
    <p style="margin-bottom: 12px; color: #666; font-size: 14px;">
        This is a <a href="https://www.npmjs.com/package/@moon-lottie/core" style="text-decoration: underline; color: #111;">@moon-lottie/core</a> example of <a href="https://lottie.cg-zhou.top/" style="text-decoration: underline; color: #111;">Moon Lottie</a>.
    </p>
    <div id="lottie-container"></div>
    <div id="controls">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <button id="prev-frame">Prev Frame</button>
        <button id="next-frame">Next Frame</button>
        <button id="forward">Forward</button>
        <button id="reverse">Reverse</button>
        <label>
            Speed
            <select id="speed">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </label>
        <label>
            <input id="loop" type="checkbox" checked>
            Loop
        </label>
    </div>
    <p id="status">Frame: 0 | Speed: 1x | Direction: forward | Loop: on</p>
    
</body>
</html>
